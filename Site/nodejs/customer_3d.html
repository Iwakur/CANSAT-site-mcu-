<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MPU-6500 3D Model</title>
</head>

<body>

<h2>Visualisation 3D (modèle réel)</h2>

<p>X: <span id="x">0</span></p>
<p>Y: <span id="y">0</span></p>
<p>Z: <span id="z">0</span></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUMIÈRE =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);


// ===== CHARGEMENT MODELE =====
let model;

const loader = new THREE.GLTFLoader();

loader.load('model.glb', function(gltf) {
    model = gltf.scene;
    scene.add(model);
}, undefined, function(error) {
    console.error("Erreur chargement :", error);
});

// ===== WEBSOCKET =====
const ws = new WebSocket("ws://localhost:3000");

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    document.getElementById("x").textContent = data.x.toFixed(2);
    document.getElementById("y").textContent = data.y.toFixed(2);
    document.getElementById("z").textContent = data.z.toFixed(2);

    if (model) {
        // Si données en degrés → convertir
        model.rotation.x = data.x * Math.PI / 180;
        model.rotation.y = data.y * Math.PI / 180;
        model.rotation.z = data.z * Math.PI / 180;
    }
};

// ===== ANIMATION =====
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// ===== RESPONSIVE =====
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
	camera.lookAt(model.position);
});
</script>

</body>
</html>
