<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MPU-6500 Image 3D</title>
</head>

<body>

<h2>Visualisation avec image</h2>

<p>X: <span id="x">0</span></p>
<p>Y: <span id="y">0</span></p>
<p>Z: <span id="z">0</span></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== TEXTURE IMAGE =====
const textureLoader = new THREE.TextureLoader();

// ⚠️ Remplace par ton image
const texture = textureLoader.load('image.png');

// ===== OBJET IMAGE =====
const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true
});

const imagePlane = new THREE.Mesh(geometry, material);
scene.add(imagePlane);

// ===== WEBSOCKET =====
const ws = new WebSocket("ws://localhost:3000");

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    document.getElementById("x").textContent = data.x.toFixed(2);
    document.getElementById("y").textContent = data.y.toFixed(2);
    document.getElementById("z").textContent = data.z.toFixed(2);

    // Rotation
    imagePlane.rotation.x = data.x;
    imagePlane.rotation.y = data.y;
    imagePlane.rotation.z = data.z;
};

// ===== LOOP =====
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// ===== RESPONSIVE =====
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
