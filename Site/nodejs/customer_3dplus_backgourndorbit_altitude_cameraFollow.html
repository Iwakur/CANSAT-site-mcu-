<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>Dashboard Télémétrie 3D</title>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<script>
// Variable globale
	let currentData = { x: 0, y: 0, z: 0, altitude: 0 };
	let cameraData = {x: 0, y: 1, z: 75};


// ===== WEBSOCKET =====
const ws = new WebSocket("ws://localhost:3000");

ws.onmessage = (event) => {
    d = JSON.parse(event.data);

    // 3D
    if (model) {
        model.rotation.x = d.x * Math.PI / 180;
        model.rotation.y = d.y * Math.PI / 180;
        model.rotation.z = d.z * Math.PI / 180;
		
		// Altitude
		model.position.y = d.altitude;
    }
};

// ===== SCENE 3D =====
	const scene = new THREE.Scene();
	scene.background = new THREE.Color(0x000000);

	const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
	camera.position.set(cameraData.x, cameraData.y, cameraData.z);

	const renderer = new THREE.WebGLRenderer();
	renderer.setSize(window.innerWidth, window.innerHeight);
	document.body.appendChild(renderer.domElement);

// Skybox Orbit
	const controls = new THREE.OrbitControls(camera, renderer.domElement);

	controls.enableDamping = true; // Activer l'inertie du mouvement
	controls.dampingFactor = 0.05;

	controls.enableZoom = true; // Activer le zoom
	controls.enablePan = false; // Permet de faire une translation du point de vue (Maintenir clique droit)

// Lumières ambiante
	const AmbientLight = new THREE.AmbientLight(0xffffff, 1);
	scene.add(AmbientLight);
	
// Lumières comme le soleil
	const DirectionalLight = new THREE.DirectionalLight(0xffffff, 2);
	DirectionalLight.position.set(5,5,5);
	scene.add(DirectionalLight);
	
// Lumières comme une ampoule
	const PointLight = new THREE.PointLight(0xffffff, 2);
	PointLight.position.set(5,5,5);
	scene.add(PointLight);

// ===== SKYBOX =====
const cubeLoader = new THREE.CubeTextureLoader();

const skybox = cubeLoader.load([
    'px.jpg',
    'nx.jpg',
    'py.jpg',
    'ny.jpg',
    'pz.jpg',
    'nz.jpg'
]);

scene.background = skybox;

// ===== MODELE =====
let model;
const loader = new THREE.GLTFLoader();

loader.load('model.glb', function(gltf) {
    model = gltf.scene;
    model.scale.set(1,1,1);
    scene.add(model);

    // Skybox Orbit
	controls.target.set(mesh.position.x, mesh.position.y, mesh.position.z);
    controls.update();
});

function animate() {
    requestAnimationFrame(animate);
	controls.update(); // obligatoire
    renderer.render(scene, camera);
}
animate();

// ===== RESPONSIVE =====
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
